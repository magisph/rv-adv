name: Hotfix — Patch Scraper .env (SCRAPER_SERVICE_KEY)

on:
  workflow_dispatch:

jobs:
  patch-env:
    name: Atualizar SCRAPER_SERVICE_KEY no servidor Hetzner
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: SSH — Atualizar .env e reiniciar scraper
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 46.224.176.59
          username: root
          password: ${{ secrets.SSH_SERVER_KEY }}
          command_timeout: 5m
          script: |
            set -e
            echo "=== [1/4] Localizando diretório e .env do scraper ==="

            SERVER_TS=$(find /root /opt /home -name "server.ts" -maxdepth 8 2>/dev/null \
              | grep -iE "local.scraper|rv.adv|scraper" | head -1 || true)

            if [ -z "$SERVER_TS" ]; then
              echo "ERRO: server.ts não encontrado"; exit 1
            fi
            echo "server.ts: $SERVER_TS"

            SCRAPER_DIR=$(dirname "$SERVER_TS")
            GIT_ROOT=$(cd "$SCRAPER_DIR" && git rev-parse --show-toplevel 2>/dev/null || dirname "$SCRAPER_DIR")
            ENV_FILE="$GIT_ROOT/.env"
            echo "Git root: $GIT_ROOT"
            echo ".env esperado: $ENV_FILE"

            if [ ! -f "$ENV_FILE" ]; then
              echo "AVISO: .env não encontrado em $ENV_FILE, criando..."
              touch "$ENV_FILE"
            fi

            echo "=== [2/4] Conteúdo atual do .env (máx 30 linhas, sem chaves) ==="
            grep -v -iE "KEY|SECRET|PASS|TOKEN" "$ENV_FILE" 2>/dev/null | head -30 || echo "(vazio ou inexistente)"

            echo "=== [3/4] Atualizando SCRAPER_SERVICE_KEY ==="
            if grep -q "^SCRAPER_SERVICE_KEY=" "$ENV_FILE" 2>/dev/null; then
              sed -i "s|^SCRAPER_SERVICE_KEY=.*|SCRAPER_SERVICE_KEY=${{ secrets.SCRAPER_ENV_KEY }}|" "$ENV_FILE"
              echo "SCRAPER_SERVICE_KEY ATUALIZADO via sed"
            else
              printf '\nSCRAPER_SERVICE_KEY=${{ secrets.SCRAPER_ENV_KEY }}\n' >> "$ENV_FILE"
              echo "SCRAPER_SERVICE_KEY ADICIONADO ao .env"
            fi

            echo "=== [4/4] Reiniciando scraper e verificando saúde ==="
            if command -v pm2 &>/dev/null; then
              pm2 restart all --update-env
              sleep 4
              pm2 status
            else
              echo "pm2 não encontrado — verificar gerenciador de processos"
              exit 1
            fi

            echo "=== Verificando rota /api/datajud/health ==="
            curl -s http://localhost:3001/api/datajud/health
            echo ""
            echo "=== Deploy concluído! ==="
