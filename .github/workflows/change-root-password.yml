name: Security — Rotate Root Password (One-Time)
# Executa UMA vez para rotacionar a senha root do servidor.
# Após execução bem-sucedida: deletar este arquivo e atualizar SSH_SERVER_KEY.

on:
  workflow_dispatch:

jobs:
  rotate:
    name: Alterar senha root via SSH (OLD → NEW)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: SSH — Alterar senha root
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 46.224.176.59
          username: root
          password: ${{ secrets.SSH_SERVER_KEY }}
          command_timeout: 2m
          script: |
            set -e
            echo "Alterando senha root..."
            echo "root:${{ secrets.NEW_SSH_SERVER_KEY }}" | chpasswd
            echo "Senha alterada com sucesso."
            echo "Verificando acesso com dados atuais (deve continuar conectado)..."
            whoami && hostname
