name: Deploy Supabase Edge Functions

on:
  push:
    branches:
      - master
    paths:
      - "supabase/functions/**"
  workflow_dispatch:
    inputs:
      function_name:
        description: "Nome da função a deployar (deixe vazio para todas)"
        required: false
        default: ""

jobs:
  deploy:
    name: Deploy Edge Functions
    runs-on: ubuntu-latest
    
    # Resolve o aviso de depreciação do Node 20
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      PROJECT_REF: uxtgcarklizhwuotkwkd
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Edge Functions
        run: |
          # Funções que NUNCA devem ter verify_jwt=true
          NO_VERIFY_FUNCTIONS="djen-bypass datajud-bypass datajud-bulk-proxy ai-proxy generate-embedding chat-jurisprudencia ocr-classify-document scrape-tnu sync-google-calendar delete-google-calendar"

          deploy_function() {
            local func="$1"
            if echo "$NO_VERIFY_FUNCTIONS" | grep -qw "$func"; then
              supabase functions deploy "$func" \
                --project-ref $PROJECT_REF \
                --no-verify-jwt \
                --use-api || echo "⚠️ Failed to deploy $func"
            else
              supabase functions deploy "$func" \
                --project-ref $PROJECT_REF \
                --use-api || echo "⚠️ Failed to deploy $func"
            fi
          }

          if [ -n "${{ github.event.inputs.function_name }}" ]; then
            echo "Deploying single function: ${{ github.event.inputs.function_name }}"
            deploy_function "${{ github.event.inputs.function_name }}"
          else
            echo "Deploying all functions in supabase/functions/"
            for dir in supabase/functions/*/; do
              # Garante que estamos pegando apenas diretórios
              if [ -d "$dir" ]; then
                func=$(basename "$dir")
                if [ "$func" = "_shared" ]; then
                  continue
                fi
                echo "→ Deploying $func..."
                deploy_function "$func"
              fi
            done
          fi
