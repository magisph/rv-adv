name: DEBUG - Diagnostico DataJud API

on:
  workflow_dispatch:

jobs:
  diagnose:
    name: Testar DataJud do servidor Hetzner
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: SSH - Diagnostico DataJud
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 46.224.176.59
          username: root
          password: ${{ secrets.SSH_SERVER_KEY }}
          command_timeout: 3m
          script: |
            SERVER_TS=$(find /root /opt /home -name "server.ts" -maxdepth 8 2>/dev/null | grep -iE "local.scraper|rv.adv" | head -1)
            GIT_ROOT=$(cd "$(dirname "$SERVER_TS")" && git rev-parse --show-toplevel)
            set -a
            source "$GIT_ROOT/.env"
            set +a
            echo "=== DIAGNOSTICO DataJud ==="
            echo "KEY presente: $([ -n "$DATAJUD_API_KEY" ] && echo SIM || echo NAO)"
            echo "KEY primeiros chars: ${DATAJUD_API_KEY:0:6}****"
            echo "KEY tem prefixo APIKey: $(echo "$DATAJUD_API_KEY" | grep -q '^APIKey ' && echo SIM || echo NAO)"
            echo ""
            echo "=== TESTE 1: com mascara ==="
            curl -s -w "\nHTTP:%{http_code}" -X POST \
              -H "Authorization: APIKey $DATAJUD_API_KEY" \
              -H "Content-Type: application/json" \
              -d '{"query":{"match":{"numeroProcesso":"3004346-79.2025.8.06.0112"}},"size":1}' \
              https://api-publica.datajud.cnj.jus.br/api_publica_tjce/_search | head -c 500
            echo ""
            echo "=== TESTE 2: raw digits ==="
            curl -s -w "\nHTTP:%{http_code}" -X POST \
              -H "Authorization: APIKey $DATAJUD_API_KEY" \
              -H "Content-Type: application/json" \
              -d '{"query":{"match":{"numeroProcesso":"30043467920258060112"}},"size":1}' \
              https://api-publica.datajud.cnj.jus.br/api_publica_tjce/_search | head -c 500
            echo ""
            echo "=== TESTE 3: TRF5 ==="
            curl -s -w "\nHTTP:%{http_code}" -X POST \
              -H "Authorization: APIKey $DATAJUD_API_KEY" \
              -H "Content-Type: application/json" \
              -d '{"query":{"match":{"numeroProcesso":"0007509-64.2025.4.05.8104"}},"size":1}' \
              https://api-publica.datajud.cnj.jus.br/api_publica_trf5/_search | head -c 500
            echo ""
            echo "=== FIM ==="
