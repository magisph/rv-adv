name: DEBUG — Diagnóstico DataJud API (temporário)
# Executar UMA VEZ para diagnóstico. Deletar após análise.

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: SSH — Testar DataJud API do servidor
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 46.224.176.59
          username: root
          password: ${{ secrets.SSH_SERVER_KEY }}
          command_timeout: 3m
          script: |
            # Carrega .env sem expor valores
            SERVER_TS=$(find /root /opt /home -name "server.ts" -maxdepth 8 2>/dev/null | grep -iE "local.scraper|rv.adv" | head -1)
            GIT_ROOT=$(cd "$(dirname "$SERVER_TS")" && git rev-parse --show-toplevel)
            set -a; source "$GIT_ROOT/.env"; set +a

            echo "=== DIAGNOSTICO DATAJUD ==="
            echo "DATAJUD_API_KEY presente: $([ -n "$DATAJUD_API_KEY" ] && echo SIM || echo NAO)"
            echo "Primeiros 6 chars da key: ${DATAJUD_API_KEY:0:6}****"
            echo "Tem prefixo APIKey: $(echo "$DATAJUD_API_KEY" | grep -q '^APIKey' && echo SIM || echo NAO)"
            echo ""

            echo "=== TESTE 1: TJCE (3004346-79.2025.8.06.0112) ==="
            STATUS=$(curl -s -o /tmp/dj1.json -w "%{http_code}" \
              -X POST \
              -H "Authorization: APIKey $DATAJUD_API_KEY" \
              -H "Content-Type: application/json" \
              -d '{"query":{"match":{"numeroProcesso":"3004346-79.2025.8.06.0112"}},"size":1}' \
              "https://api-publica.datajud.cnj.jus.br/api_publica_tjce/_search")
            echo "HTTP: $STATUS"
            python3 -c "
import json
with open('/tmp/dj1.json') as f: d = json.load(f)
hits = d.get('hits', {}).get('hits', [])
total = d.get('hits', {}).get('total', {}).get('value', 0)
error = d.get('error', {}).get('reason', '')
print(f'Total hits: {total} | Hits retornados: {len(hits)} | Erro: {error[:100] if error else "nenhum"}')
" 2>/dev/null || cat /tmp/dj1.json | head -c 300

            echo ""
            echo "=== TESTE 2: Raw digits (sem máscara) ==="
            STATUS=$(curl -s -o /tmp/dj2.json -w "%{http_code}" \
              -X POST \
              -H "Authorization: APIKey $DATAJUD_API_KEY" \
              -H "Content-Type: application/json" \
              -d '{"query":{"match":{"numeroProcesso":"30043467920258060112"}},"size":1}' \
              "https://api-publica.datajud.cnj.jus.br/api_publica_tjce/_search")
            echo "HTTP: $STATUS"
            python3 -c "
import json
with open('/tmp/dj2.json') as f: d = json.load(f)
total = d.get('hits', {}).get('total', {}).get('value', 0)
hits = d.get('hits', {}).get('hits', [])
error = d.get('error', {}).get('reason', '')
print(f'Total hits: {total} | Hits retornados: {len(hits)} | Erro: {error[:100] if error else "nenhum"}')
" 2>/dev/null

            echo ""
            echo "=== TESTE 3: TRF5 (0007509-64.2025.4.05.8104) ==="
            STATUS=$(curl -s -o /tmp/dj3.json -w "%{http_code}" \
              -X POST \
              -H "Authorization: APIKey $DATAJUD_API_KEY" \
              -H "Content-Type: application/json" \
              -d '{"query":{"match":{"numeroProcesso":"0007509-64.2025.4.05.8104"}},"size":1}' \
              "https://api-publica.datajud.cnj.jus.br/api_publica_trf5/_search")
            echo "HTTP: $STATUS"
            python3 -c "
import json
with open('/tmp/dj3.json') as f: d = json.load(f)
total = d.get('hits', {}).get('total', {}).get('value', 0)
hits = d.get('hits', {}).get('hits', [])
error = d.get('error', {}).get('reason', '')
print(f'Total hits: {total} | Hits retornados: {len(hits)} | Erro: {error[:100] if error else "nenhum"}')
" 2>/dev/null

            rm -f /tmp/dj1.json /tmp/dj2.json /tmp/dj3.json
            echo ""
            echo "=== FIM DO DIAGNOSTICO ==="
