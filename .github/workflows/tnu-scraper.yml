name: Coleta Automatizada TNU

# Executa diariamente às 03:00 BRT (06:00 UTC) para coletar novos acórdãos da TNU.
# Usa rotação de termos de busca para garantir diversidade na base de jurisprudência.
# Também pode ser disparado manualmente pelo painel do GitHub Actions.
on:
  schedule:
    # 06:00 UTC = 03:00 BRT (horário de Brasília)
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      termo_indice:
        description: "Índice do termo de busca (0-29). Deixe vazio para usar rotação automática por data."
        required: false
        default: ""
      paginas_por_termo:
        description: "Páginas a coletar por termo (padrão: 5 = 50 acórdãos)"
        required: false
        default: "5"

jobs:
  scrape-tnu:
    name: Coletar Acórdãos TNU
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # Adicionado para silenciar o aviso do Node 20 e usar o motor Node 24
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Executar coleta com rotação de termos
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, os, time, sys
          from datetime import datetime

          # ── [fix] Validação de secrets — fail-fast com mensagem clara (Bug #1 e #3) ──
          SUPABASE_URL = os.environ.get("SUPABASE_URL", "").strip()
          SERVICE_KEY  = os.environ.get("SUPABASE_SERVICE_ROLE_KEY", "").strip()

          if not SUPABASE_URL.startswith("https://"):
              print(f"❌ FATAL: SUPABASE_URL inválida ou não configurada: '{SUPABASE_URL}'")
              print("   Configure o secret SUPABASE_URL em: github.com/magisph/rv-adv/settings/secrets/actions")
              sys.exit(1)
          if not SERVICE_KEY:
              print("❌ FATAL: SUPABASE_SERVICE_ROLE_KEY não configurada")
              print("   Configure o secret em: github.com/magisph/rv-adv/settings/secrets/actions")
              sys.exit(1)

          FUNCTION_URL = f"{SUPABASE_URL}/functions/v1/scrape-tnu"

          # ── [fix] Retry com backoff exponencial para falhas transitórias (Bug #5) ────
          def http_call(url, method="GET", data=None, headers=None, timeout=30, max_retries=3):
              """Realiza chamada HTTP com retry exponencial para falhas transitórias de rede.
              Erros HTTP definitivos (4xx/5xx) são retornados imediatamente sem retry."""
              if headers is None:
                  headers = {}
              last_err = None
              for attempt in range(max_retries):
                  try:
                      req = urllib.request.Request(url, data=data, headers=headers, method=method)
                      with urllib.request.urlopen(req, timeout=timeout) as r:
                          return r.read(), None
                  except urllib.error.HTTPError as e:
                      body = e.read().decode()
                      return None, f"HTTP {e.code}: {body[:200]}"  # Erro definitivo — sem retry
                  except Exception as e:
                      last_err = e
                      if attempt < max_retries - 1:
                          wait = 2 ** attempt
                          print(f"    ⚠️ Tentativa {attempt+1}/{max_retries}: {e}. Retry em {wait}s...")
                          time.sleep(wait)
              return None, f"Todas as {max_retries} tentativas falharam: {last_err}"

          # Lista de 30 termos de busca cobrindo diferentes áreas do direito previdenciário
          # Cada dia da semana usa um subconjunto diferente para maximizar a diversidade
          TERMOS = [
              # Benefícios por incapacidade
              "auxílio-doença",
              "aposentadoria por invalidez",
              "incapacidade laborativa",
              "nexo causal",
              "laudo pericial",
              # Benefícios assistenciais
              "benefício de prestação continuada BPC LOAS",
              "miserabilidade",
              "pessoa com deficiência LOAS",
              "idoso BPC",
              "renda per capita",
              # Benefícios por morte e família
              "pensão por morte",
              "dependente econômico",
              "salário-maternidade",
              "auxílio-reclusão",
              "cônjuge divorciado",
              # Aposentadorias
              "aposentadoria especial",
              "agente nocivo",
              "tempo de serviço rural",
              "segurado especial",
              "carência",
              # Acidentes e doenças
              "auxílio-acidente",
              "doença ocupacional",
              "acidente de trabalho",
              "sequela permanente",
              "redução da capacidade",
              # Questões processuais e de cálculo
              "revisão de benefício",
              "data de início do benefício DIB",
              "salário de benefício",
              "período de graça",
              "qualidade de segurado",
          ]

          # Determinar qual termo usar hoje (rotação por dia do ano)
          termo_indice_input = "${{ github.event.inputs.termo_indice }}"
          paginas_por_termo = int("${{ github.event.inputs.paginas_por_termo || '5' }}")

          if termo_indice_input.strip():
              # Índice manual especificado
              termo_indice = int(termo_indice_input.strip()) % len(TERMOS)
              print(f"📌 Termo manual especificado: índice {termo_indice}")
          else:
              # Rotação automática: 2 termos por dia (dia do ano % 15 = índice base)
              dia_do_ano = datetime.utcnow().timetuple().tm_yday
              termo_indice = (dia_do_ano * 2) % len(TERMOS)
              print(f"🔄 Rotação automática: dia {dia_do_ano} → índice {termo_indice}")

          # Coletar 2 termos consecutivos por execução para aumentar diversidade
          termos_hoje = [
              TERMOS[termo_indice % len(TERMOS)],
              TERMOS[(termo_indice + 1) % len(TERMOS)],
          ]

          print(f"📚 Termos de hoje: {termos_hoje}")
          print(f"📄 Páginas por termo: {paginas_por_termo}")
          print()

          total_coletados = 0
          total_salvos = 0

          for termo in termos_hoje:
              print(f"\n🔍 Coletando: '{termo}'")
              for pagina in range(paginas_por_termo):
                  offset = pagina * 10
                  payload = json.dumps({
                      "termo": termo,
                      "offset": offset
                  }).encode()

                  raw, err = http_call(
                      FUNCTION_URL,
                      method="POST",
                      data=payload,
                      headers={
                          "Authorization": f"Bearer {SERVICE_KEY}",
                          "Content-Type": "application/json",
                          "x-region": "sa-east-1",
                      },
                      timeout=30
                  )

                  if err:
                      print(f"  ❌ Erro (offset={offset}): {err}")
                      break

                  result = json.loads(raw)
                  coletados = result.get("coletados", 0)
                  salvos = result.get("salvos", 0)
                  proximo_disponivel = result.get("proximo_disponivel", False)

                  total_coletados += coletados
                  total_salvos += salvos

                  print(f"  p{pagina+1}: {coletados} coletados, {salvos} salvos")

                  if not proximo_disponivel:
                      print(f"  ✅ Sem mais páginas para '{termo}'")
                      break

                  time.sleep(2)

          print()
          print(f"📊 RESUMO DA COLETA:")
          print(f"   Termos pesquisados: {len(termos_hoje)}")
          print(f"   Acórdãos coletados: {total_coletados}")
          print(f"   Acórdãos salvos/atualizados: {total_salvos}")

          if total_coletados == 0:
              print("\n⚠️  Nenhum acórdão coletado — verificar logs acima")
              sys.exit(1)
          PYEOF

      - name: Gerar embeddings para novos acórdãos
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, os, time, sys

          # ── [fix] Validação de secrets — fail-fast com mensagem clara (Bug #1 e #3) ──
          SUPABASE_URL = os.environ.get("SUPABASE_URL", "").strip()
          SERVICE_KEY  = os.environ.get("SUPABASE_SERVICE_ROLE_KEY", "").strip()

          if not SUPABASE_URL.startswith("https://"):
              print(f"❌ FATAL: SUPABASE_URL inválida ou não configurada: '{SUPABASE_URL}'")
              print("   Configure o secret SUPABASE_URL em: github.com/magisph/rv-adv/settings/secrets/actions")
              sys.exit(1)
          if not SERVICE_KEY:
              print("❌ FATAL: SUPABASE_SERVICE_ROLE_KEY não configurada")
              print("   Configure o secret em: github.com/magisph/rv-adv/settings/secrets/actions")
              sys.exit(1)

          EMBED_URL = f"{SUPABASE_URL}/functions/v1/generate-embedding"

          # ── [fix] Retry com backoff exponencial para falhas transitórias (Bug #5) ────
          def http_call(url, method="GET", data=None, headers=None, timeout=30, max_retries=3):
              """Realiza chamada HTTP com retry exponencial para falhas transitórias de rede.
              Erros HTTP definitivos (4xx/5xx) são retornados imediatamente sem retry."""
              if headers is None:
                  headers = {}
              last_err = None
              for attempt in range(max_retries):
                  try:
                      req = urllib.request.Request(url, data=data, headers=headers, method=method)
                      with urllib.request.urlopen(req, timeout=timeout) as r:
                          return r.read(), None
                  except urllib.error.HTTPError as e:
                      body = e.read().decode()
                      return None, f"HTTP {e.code}: {body[:200]}"  # Erro definitivo — sem retry
                  except Exception as e:
                      last_err = e
                      if attempt < max_retries - 1:
                          wait = 2 ** attempt
                          print(f"    ⚠️ Tentativa {attempt+1}/{max_retries}: {e}. Retry em {wait}s...")
                          time.sleep(wait)
              return None, f"Todas as {max_retries} tentativas falharam: {last_err}"

          HEADERS_SB = {
              "Authorization": f"Bearer {SERVICE_KEY}",
              "apikey": SERVICE_KEY,
              "Content-Type": "application/json",
          }

          print("🔢 Gerando embeddings para acórdãos pendentes...")

          # Busca registros com embedding_status = 'pending'
          raw, err = http_call(
              f"{SUPABASE_URL}/rest/v1/jurisprudences?embedding_status=eq.pending&select=id,process_number,excerpt&limit=100",
              method="GET",
              headers=HEADERS_SB,
              timeout=15
          )

          if err:
              print(f"❌ Erro ao buscar acórdãos pendentes: {err}")
              sys.exit(1)

          pendentes = json.loads(raw)
          total = len(pendentes)
          print(f"   {total} acórdãos pendentes de embedding")

          ok = 0
          errs = 0

          for i, row in enumerate(pendentes):
              texto = (row.get("excerpt") or "").strip()
              if len(texto) < 10:
                  print(f"  [{i+1:03d}/{total}] {row['process_number'][:35]} — texto vazio, pulando")
                  continue

              # Gerar embedding via Edge Function
              payload = json.dumps({
                  "text": texto[:25000],
                  "taskType": "RETRIEVAL_DOCUMENT"
              }).encode()

              raw_embed, err_embed = http_call(
                  EMBED_URL,
                  method="POST",
                  data=payload,
                  headers={
                      "Authorization": f"Bearer {SERVICE_KEY}",
                      "Content-Type": "application/json",
                      "x-region": "sa-east-1",
                  },
                  timeout=25
              )

              if err_embed:
                  print(f"  [{i+1:03d}/{total}] ❌ {row['process_number'][:35]} — Gemini: {err_embed}")
                  errs += 1
                  time.sleep(2)
                  continue

              result = json.loads(raw_embed)
              embedding = result.get("embedding", [])
              if not embedding:
                  print(f"  [{i+1:03d}/{total}] ❌ {row['process_number'][:35]} — Embedding vazio: {result}")
                  errs += 1
                  continue

              # Salvar embedding no banco
              update_payload = json.dumps({
                  "embedding": embedding,
                  "embedding_status": "completed"
              }).encode()

              raw_up, err_up = http_call(
                  f"{SUPABASE_URL}/rest/v1/jurisprudences?id=eq.{row['id']}",
                  method="PATCH",
                  data=update_payload,
                  headers={**HEADERS_SB, "Prefer": "return=minimal"},
                  timeout=10
              )

              if err_up:
                  print(f"  [{i+1:03d}/{total}] ❌ {row['process_number'][:35]} — Supabase: {err_up}")
                  errs += 1
              else:
                  ok += 1
                  print(f"  [{i+1:03d}/{total}] ✅ {row['process_number'][:35]} — {len(embedding)} dims")

              time.sleep(0.6)  # ~1.5 req/s para respeitar rate limit

          print(f"\n📊 Embeddings: {ok} gerados | {errs} erros | {total} total")
          PYEOF
