name: Deploy Local Scraper (Hetzner)
# Workflow unificado de deploy do local-scraper via SSH.
# Substitui: deploy-local-scraper.yml, patch-scraper-env.yml, restart-scraper-clean.yml

on:
  push:
    branches: [master]
    paths: ['local-scraper/**']
  workflow_dispatch:

jobs:
  deploy:
    name: Pull & restart scraper via SSH
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: SSH — Deploy local-scraper no Hetzner
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 46.224.176.59
          username: root
          password: ${{ secrets.SSH_SERVER_KEY }}
          command_timeout: 10m
          script: |
            set -e
            echo "========================================"
            echo " [1/5] Localizando repositório"
            echo "========================================"
            SERVER_TS=$(find /root /opt /home -name "server.ts" -maxdepth 8 2>/dev/null \
              | grep -iE "local.scraper|rv.adv|scraper" | head -1)
            [ -z "$SERVER_TS" ] && { echo "ERRO: server.ts não encontrado"; exit 1; }
            SCRAPER_DIR=$(dirname "$SERVER_TS")
            GIT_ROOT=$(cd "$SCRAPER_DIR" && git rev-parse --show-toplevel)
            echo "Git root: $GIT_ROOT | Scraper dir: $SCRAPER_DIR"

            echo "========================================"
            echo " [2/5] Git pull origin master"
            echo "========================================"
            cd "$GIT_ROOT"
            git log --oneline -2
            git pull origin master
            git log --oneline -2

            echo "========================================"
            echo " [3/5] Verificar / atualizar .env"
            echo "========================================"
            ENV_FILE="$GIT_ROOT/.env"
            [ -f "$ENV_FILE" ] || touch "$ENV_FILE"
            if grep -q "^SCRAPER_SERVICE_KEY=" "$ENV_FILE" 2>/dev/null; then
              sed -i "s|^SCRAPER_SERVICE_KEY=.*|SCRAPER_SERVICE_KEY=${{ secrets.SCRAPER_ENV_KEY }}|" "$ENV_FILE"
              echo "SCRAPER_SERVICE_KEY atualizado"
            else
              printf '\nSCRAPER_SERVICE_KEY=${{ secrets.SCRAPER_ENV_KEY }}\n' >> "$ENV_FILE"
              echo "SCRAPER_SERVICE_KEY adicionado"
            fi

            echo "========================================"
            echo " [4/5] PM2 delete + fresh start"
            echo "========================================"
            export SCRAPER_SERVICE_KEY='${{ secrets.SCRAPER_ENV_KEY }}'
            pm2 delete all 2>/dev/null || true
            sleep 1
            cd "$SCRAPER_DIR"
            pm2 start server.ts --name scraper --interpreter tsx 2>/dev/null || \
            pm2 start server.ts --name scraper --interpreter ts-node 2>/dev/null || \
            pm2 start server.ts --name scraper
            pm2 save
            sleep 5
            pm2 status

            echo "========================================"
            echo " [5/5] Health check"
            echo "========================================"
            curl -sf http://localhost:3001/api/datajud/health
            echo ""
            echo "===== Deploy concluído! ====="
